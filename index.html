<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Point do Açaí</title>

<style>
body{margin:0;font-family:Arial;background:linear-gradient(180deg,#3b0764,#6b21a8);color:white}
header{text-align:center;padding:20px}
header h1{color:#22c55e;font-size:26px}
.container{padding:15px}
.step{display:none}
.step.active{display:block}
.card{background:#ffffff10;border-radius:16px;padding:15px;margin-bottom:15px;border:1px solid #ffffff20}
label{display:block;padding:10px;margin-bottom:5px;background:#00000030;border-radius:10px;cursor:pointer}
button{padding:14px;border:none;border-radius:12px;font-weight:bold;margin-top:10px}
.next{background:#22c55e;color:#000;width:100%}
.back{background:#555;color:#fff;width:100%}
.cart-float{position:fixed;bottom:20px;right:20px;background:#22c55e;color:#000;padding:15px 20px;border-radius:50px;font-weight:bold}
.resumo-box{background:#00000040;padding:15px;border-radius:12px;margin-top:10px}
input{width:100%;padding:10px;margin-top:8px;border-radius:10px;border:none}
</style>
</head>

<body>

<header>
<h1>🍇 Point do Açaí</h1>
<p>Monte seu açaí do seu jeito</p>
<button onclick="start()">Montar Meu Açaí</button>
</header>

<div class="container">

<!-- STEP 1 -->
<div class="step" id="step1">
<div class="card">
<h2>Tamanho</h2>
<label><input type="radio" name="tamanho" value="300ml"> 300ml</label>
<label><input type="radio" name="tamanho" value="400ml"> 400ml</label>
<label><input type="radio" name="tamanho" value="500ml"> 500ml</label>
<label><input type="radio" name="tamanho" value="700ml"> 700ml</label>
</div>
<button class="next" onclick="next(2)">Continuar</button>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
<div class="card">
<h2>Creme Gelado</h2>
<label><input type="checkbox" value="Cupuaçu"> Cupuaçu</label>
<label><input type="checkbox" value="Leitinho"> Leitinho</label>
<label><input type="checkbox" value="Ovomaltine"> Ovomaltine</label>
<label><input type="checkbox" value="Maracujá"> Maracujá</label>
<label><input type="checkbox" value="Chocolate com Avelã"> Chocolate com Avelã</label>
<label><input type="checkbox" value="Moranguinho"> Moranguinho</label>
<label><input type="checkbox" value="Creme com Passas"> Creme com Passas</label>
<label><input type="checkbox" value="Paçoquinha"> Paçoquinha</label>
<label><input type="checkbox" value="Maracujá Trufado"> Maracujá Trufado</label>
<label><input type="checkbox" value="Torta de Limão"> Torta de Limão</label>
<label><input type="checkbox" value="Leitinho Trufado"> Leitinho Trufado</label>
<label><input type="checkbox" value="Greco com Frutas"> Greco com Frutas</label>
<label><input type="checkbox" value="Chocolate Belga"> Chocolate Belga</label>
<label><input type="checkbox" value="Vermelhas"> Vermelhas</label>
<label><input type="checkbox" value="Chocolate Branco"> Chocolate Branco</label>
<label><input type="checkbox" value="Pink Blue"> Pink Blue</label>
</div>
<button class="back" onclick="voltar(1)">⬅ Voltar</button>
<button class="next" onclick="next(3)">Continuar</button>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">
<div class="card">
<h2>2º Acompanhamento</h2>
<label><input type="checkbox" value="Creme de Avelã"> Creme de Avelã</label>
<label><input type="checkbox" value="Creme de Côco"> Creme de Côco</label>
<label><input type="checkbox" value="Skimo"> Skimo</label>
<label><input type="checkbox" value="Morango em Caldas"> Morango em Caldas</label>
<label><input type="checkbox" value="Abacaxi ao Vinho"> Abacaxi ao Vinho</label>
<label><input type="checkbox" value="Cereja em Caldas"> Cereja em Caldas</label>
<label><input type="checkbox" value="Cookies Brancos"> Cookies Brancos</label>
<label><input type="checkbox" value="Maracujá em Caldas"> Maracujá em Caldas</label>
<label><input type="checkbox" value="Paçoca Cream"> Paçoca Cream</label>
<label><input type="checkbox" value="Choco Leitinho"> Choco Leitinho</label>
<label><input type="checkbox" value="Choco Waffer"> Choco Waffer</label>
<label><input type="checkbox" value="Frutas Vermelhas"> Frutas Vermelhas</label>
<label><input type="checkbox" value="Creme de Morango"> Creme de Morango</label>
<label><input type="checkbox" value="Creme de Sonho de Valsa"> Creme de Sonho de Valsa</label>
</div>
<button class="back" onclick="voltar(2)">⬅ Voltar</button>
<button class="next" onclick="next(4)">Continuar</button>
</div>

<!-- STEP 4 -->
<div class="step" id="step4">
<div class="card">
<h2>3º Acompanhamento</h2>
<label><input type="checkbox" value="Granulado"> Granulado</label>
<label><input type="checkbox" value="Disquete"> Disquete</label>
<label><input type="checkbox" value="Neston"> Neston</label>
<label><input type="checkbox" value="Paçoca"> Paçoca</label>
<label><input type="checkbox" value="Tubitos"> Tubitos</label>
<label><input type="checkbox" value="Farinha Lacta"> Farinha Lacta</label>
<label><input type="checkbox" value="Granola"> Granola</label>
<label><input type="checkbox" value="Jujuba"> Jujuba</label>
<label><input type="checkbox" value="Ovomaltine (Pó)"> Ovomaltine (Pó)</label>
<label><input type="checkbox" value="Kakauzinho"> Kakauzinho</label>
<label><input type="checkbox" value="Gotas de Chocolate"> Gotas de Chocolate</label>
<label><input type="checkbox" value="Morango"> Morango</label>
<label><input type="checkbox" value="Jujuba Ácida"> Jujuba Ácida</label>
<label><input type="checkbox" value="Choco Power"> Choco Power</label>
<label><input type="checkbox" value="Confete"> Confete</label>
<label><input type="checkbox" value="Uva Passas"> Uva Passas</label>
<label><input type="checkbox" value="Granulado Colorido"> Granulado Colorido</label>
<label><input type="checkbox" value="Oreo"> Oreo</label>
<label><input type="checkbox" value="Kiwi"> Kiwi</label>
<label><input type="checkbox" value="Granulado Gourmet"> Granulado Gourmet</label>
<label><input type="checkbox" value="Bis"> Bis</label>
<label><input type="checkbox" value="Banana"> Banana</label>
<label><input type="checkbox" value="Marshmallow"> Marshmallow</label>
<label><input type="checkbox" value="Leite em Pó"> Leite em Pó</label>
<label><input type="checkbox" value="Amendoim"> Amendoim</label>
<label><input type="checkbox" value="Fini"> Fini</label>
</div>
<button class="back" onclick="voltar(3)">⬅ Voltar</button>
<button class="next" onclick="next(5)">Continuar</button>
</div>

<!-- STEP 5 -->
<div class="step" id="step5">
<div class="card">
<h2>Cobertura</h2>
<label><input type="checkbox" value="Leite Condensado"> Leite Condensado</label>
<label><input type="checkbox" value="Frutas Vermelhas"> Frutas Vermelhas</label>
<label><input type="checkbox" value="Chocolate / Melaço"> Chocolate / Melaço</label>
<label><input type="checkbox" value="Morango / Caramelo"> Morango / Caramelo</label>
<label><input type="checkbox" value="Maracujá / Abacaxi"> Maracujá / Abacaxi</label>
<label><input type="checkbox" value="Kiwi / Limão / Açaí"> Kiwi / Limão / Açaí</label>
<label><input type="checkbox" value="Uva / Tutti Frutti"> Uva / Tutti Frutti</label>
</div>

<div class="card">
<h2>Finalizar</h2>
<input id="nome" placeholder="Seu nome">
<input id="tel" placeholder="Telefone">
<input id="end" placeholder="Endereço">
<div class="resumo-box" id="resumo"></div>
</div>

<button class="back" onclick="voltar(4)">⬅ Voltar</button>
<button class="next" onclick="finalizar()">Enviar Pedido</button>
</div>

</div>

<div class="cart-float" onclick="verResumo()">🛒 <span id="qtd">0</span></div>

<script>

let pedido = {};

function start(){
  document.getElementById('step1').classList.add('active');
}

function next(n){
  salvar();
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.getElementById('step'+n).classList.add('active');
  renderResumo();
}

function voltar(n){
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.getElementById('step'+n).classList.add('active');
}

function salvar(){
  pedido = {};

  let tamanho = document.querySelector('input[name="tamanho"]:checked');
  if(tamanho) pedido.tamanho = tamanho.value;

  pedido.cremes = [...document.querySelectorAll('#step2 input:checked')].map(i=>i.value);
  pedido.acomp2 = [...document.querySelectorAll('#step3 input:checked')].map(i=>i.value);
  pedido.acomp3 = [...document.querySelectorAll('#step4 input:checked')].map(i=>i.value);
  pedido.cobertura = [...document.querySelectorAll('#step5 input:checked')].map(i=>i.value);

  update();
}

function update(){
  let total = 0;
  Object.values(pedido).forEach(v=>{
    if(Array.isArray(v)) total += v.length;
    else if(v) total++;
  });
  document.getElementById('qtd').innerText = total;
}

function renderResumo(){
  let box = document.getElementById('resumo');
  box.innerHTML = "<b>Resumo (clique para editar):</b><br>";

  if(pedido.tamanho){
    box.innerHTML += `• ${pedido.tamanho} <button onclick="voltar(1)">Editar</button><br>`;
  }

  pedido.cremes?.forEach(v=>{
    box.innerHTML += `• ${v} <button onclick="voltar(2)">Editar</button><br>`;
  });

  pedido.acomp2?.forEach(v=>{
    box.innerHTML += `• ${v} <button onclick="voltar(3)">Editar</button><br>`;
  });

  pedido.acomp3?.forEach(v=>{
    box.innerHTML += `• ${v} <button onclick="voltar(4)">Editar</button><br>`;
  });

  pedido.cobertura?.forEach(v=>{
    box.innerHTML += `• ${v} <button onclick="voltar(5)">Editar</button><br>`;
  });
}

function verResumo(){
  renderResumo();
  alert('Clique em editar para alterar 👇');
}

function finalizar(){
  let nome = document.getElementById('nome').value;
  let tel = document.getElementById('tel').value;
  let end = document.getElementById('end').value;

  if(!nome || !tel || !end){
    alert('Preencha tudo');
    return;
  }

  let txt = 'Pedido:%0A';

  Object.values(pedido).forEach(v=>{
    if(Array.isArray(v)){
      v.forEach(i=> txt+='- '+i+'%0A');
    } else if(v){
      txt+='- '+v+'%0A';
    }
  });

  txt += `%0A👤 ${nome}%0A📞 ${tel}%0A📍 ${end}%0A*Aguardando peso e valor*`;

  window.location.href='https://wa.me/5575983101631?text='+txt;
}

</script>

</body>
</html>
