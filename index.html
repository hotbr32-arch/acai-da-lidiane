<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Point do Açaí</title>

<style>
body{margin:0;font-family:Arial;background:linear-gradient(180deg,#3b0764,#6b21a8);color:white}
header{text-align:center;padding:20px}
header h1{color:#22c55e;font-size:26px}
.btn-start{background:#22c55e;color:#000;padding:14px 20px;border:none;border-radius:12px;font-weight:bold;animation:pulse 1.5s infinite}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
.container{padding:15px}
.step{display:none;animation:fade .4s}
.step.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{background:#ffffff10;backdrop-filter:blur(10px);border-radius:16px;padding:15px;margin-bottom:15px;border:1px solid #ffffff20}
h2{color:#22c55e}
label{display:block;padding:10px;border-radius:10px;margin-bottom:5px;background:#00000030;cursor:pointer;transition:.2s}
input:checked + span{color:#22c55e;font-weight:bold}
button{padding:14px;border:none;border-radius:12px;font-weight:bold}
.next{background:#22c55e;color:#000;width:100%}
.cart-float{position:fixed;bottom:20px;right:20px;background:#22c55e;color:#000;padding:15px 20px;border-radius:50px;font-weight:bold;box-shadow:0 4px 20px #0008}
.loading{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000c;justify-content:center;align-items:center;font-size:22px}
.resumo-box{background:#00000040;padding:15px;border-radius:12px;margin-top:10px}
input{width:100%;padding:10px;margin-top:8px;border-radius:10px;border:none}
</style>
</head>
<body>

<header>
<h1>🍇 Point do Açaí</h1>
<p>Monte seu açaí do seu jeito</p>
<button class="btn-start" onclick="start()">Montar Meu Açaí</button>
</header>

<div class="container">

<!-- STEP 1 -->
<div class="step" id="step1">
<div class="card">
<h2>Tamanho</h2>
<label><input type="radio" name="tamanho" value="300ml"> <span>300ml</span></label>
<label><input type="radio" name="tamanho" value="400ml"> <span>400ml</span></label>
<label><input type="radio" name="tamanho" value="500ml"> <span>500ml</span></label>
<label><input type="radio" name="tamanho" value="700ml"> <span>700ml</span></label>
</div>
<button class="next" onclick="next(2)">Continuar</button>
</div>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
<div class="card">
<h2>Creme Gelado</h2>
<label><input type="checkbox" value="Cupuaçu"> <span>Cupuaçu</span></label>
<label><input type="checkbox" value="Leitinho"> <span>Leitinho</span></label>
<label><input type="checkbox" value="Ovomaltine"> <span>Ovomaltine</span></label>
<label><input type="checkbox" value="Maracujá"> <span>Maracujá</span></label>
<label><input type="checkbox" value="Chocolate com Avelã"> <span>Chocolate com Avelã</span></label>
<label><input type="checkbox" value="Moranguinho"> <span>Moranguinho</span></label>
<label><input type="checkbox" value="Creme com Passas"> <span>Creme com Passas</span></label>
<label><input type="checkbox" value="Paçoquinha"> <span>Paçoquinha</span></label>
<label><input type="checkbox" value="Maracujá Trufado"> <span>Maracujá Trufado</span></label>
<label><input type="checkbox" value="Torta de Limão"> <span>Torta de Limão</span></label>
<label><input type="checkbox" value="Leitinho Trufado"> <span>Leitinho Trufado</span></label>
<label><input type="checkbox" value="Greco com Frutas"> <span>Greco com Frutas</span></label>
<label><input type="checkbox" value="Chocolate Belga"> <span>Chocolate Belga</span></label>
<label><input type="checkbox" value="Vermelhas"> <span>Vermelhas</span></label>
<label><input type="checkbox" value="Chocolate Branco"> <span>Chocolate Branco</span></label>
<label><input type="checkbox" value="Pink Blue"> <span>Pink Blue</span></label>
</div>
<button class="next" onclick="next(3)">Continuar</button>
</div>

<!-- STEP 3 (2º ACOMPANHAMENTO) -->
<div class="step" id="step3">
<div class="card">
<h2>2º Acompanhamento</h2>
<label><input type="checkbox" value="Creme de Avelã"> <span>Creme de Avelã</span></label>
<label><input type="checkbox" value="Creme de Côco"> <span>Creme de Côco</span></label>
<label><input type="checkbox" value="Skimo"> <span>Skimo</span></label>
<label><input type="checkbox" value="Morango em Caldas"> <span>Morango em Caldas</span></label>
<label><input type="checkbox" value="Abacaxi ao Vinho"> <span>Abacaxi ao Vinho</span></label>
<label><input type="checkbox" value="Cereja em Caldas"> <span>Cereja em Caldas</span></label>
<label><input type="checkbox" value="Cookies Brancos"> <span>Cookies Brancos</span></label>
<label><input type="checkbox" value="Maracujá em Caldas"> <span>Maracujá em Caldas</span></label>
<label><input type="checkbox" value="Paçoca Cream"> <span>Paçoca Cream</span></label>
<label><input type="checkbox" value="Choco Leitinho"> <span>Choco Leitinho</span></label>
<label><input type="checkbox" value="Choco Waffer"> <span>Choco Waffer</span></label>
<label><input type="checkbox" value="Frutas Vermelhas"> <span>Frutas Vermelhas</span></label>
<label><input type="checkbox" value="Creme de Morango"> <span>Creme de Morango</span></label>
<label><input type="checkbox" value="Creme de Sonho de Valsa"> <span>Creme de Sonho de Valsa</span></label>
</div>
<button class="next" onclick="next(4)">Continuar</button>
</div>

<!-- STEP 4 (3º ACOMPANHAMENTO) -->
<div class="step" id="step4">
<div class="card">
<h2>3º Acompanhamento</h2>
<label><input type="checkbox" value="Granulado"> <span>Granulado</span></label>
<label><input type="checkbox" value="Disquete"> <span>Disquete</span></label>
<label><input type="checkbox" value="Neston"> <span>Neston</span></label>
<label><input type="checkbox" value="Paçoca"> <span>Paçoca</span></label>
<label><input type="checkbox" value="Tubitos"> <span>Tubitos</span></label>
<label><input type="checkbox" value="Farinha Lacta"> <span>Farinha Lacta</span></label>
<label><input type="checkbox" value="Granola"> <span>Granola</span></label>
<label><input type="checkbox" value="Jujuba"> <span>Jujuba</span></label>
<label><input type="checkbox" value="Ovomaltine (Pó)"> <span>Ovomaltine (Pó)</span></label>
<label><input type="checkbox" value="Kakauzinho"> <span>Kakauzinho</span></label>
<label><input type="checkbox" value="Gotas de Chocolate"> <span>Gotas de Chocolate</span></label>
<label><input type="checkbox" value="Morango"> <span>Morango</span></label>
<label><input type="checkbox" value="Jujuba Ácida"> <span>Jujuba Ácida</span></label>
<label><input type="checkbox" value="Choco Power"> <span>Choco Power</span></label>
<label><input type="checkbox" value="Confete"> <span>Confete</span></label>
<label><input type="checkbox" value="Uva Passas"> <span>Uva Passas</span></label>
<label><input type="checkbox" value="Granulado Colorido"> <span>Granulado Colorido</span></label>
<label><input type="checkbox" value="Oreo"> <span>Oreo</span></label>
<label><input type="checkbox" value="Kiwi"> <span>Kiwi</span></label>
<label><input type="checkbox" value="Granulado Gourmet"> <span>Granulado Gourmet</span></label>
<label><input type="checkbox" value="Bis"> <span>Bis</span></label>
<label><input type="checkbox" value="Banana"> <span>Banana</span></label>
<label><input type="checkbox" value="Marshmallow"> <span>Marshmallow</span></label>
<label><input type="checkbox" value="Leite em Pó"> <span>Leite em Pó</span></label>
<label><input type="checkbox" value="Amendoim"> <span>Amendoim</span></label>
<label><input type="checkbox" value="Fini"> <span>Fini</span></label>
</div>
<button class="next" onclick="next(5)">Continuar</button>
</div>

<!-- STEP 5 (COBERTURA) -->
<div class="step" id="step5">
<div class="card">
<h2>Cobertura</h2>
<label><input type="checkbox" value="Leite Condensado"> <span>Leite Condensado</span></label>
<label><input type="checkbox" value="Frutas Vermelhas"> <span>Frutas Vermelhas</span></label>
<label><input type="checkbox" value="Chocolate / Melaço"> <span>Chocolate / Melaço</span></label>
<label><input type="checkbox" value="Morango / Caramelo"> <span>Morango / Caramelo</span></label>
<label><input type="checkbox" value="Maracujá / Abacaxi"> <span>Maracujá / Abacaxi</span></label>
<label><input type="checkbox" value="Kiwi / Limão / Açaí"> <span>Kiwi / Limão / Açaí</span></label>
<label><input type="checkbox" value="Uva / Tutti Frutti"> <span>Uva / Tutti Frutti</span></label>
</div>

<div class="card">
<h2>Finalizar</h2>
<input id="nome" placeholder="Seu nome">
<input id="tel" placeholder="Telefone">
<input id="end" placeholder="Endereço">
<div class="resumo-box" id="resumo"></div>
</div>

<button class="next" onclick="finalizar()">Enviar Pedido</button>
</div>

</div>

<div class="cart-float" onclick="verResumo()">🛒 <span id="qtd">0</span></div>
<div class="loading" id="loading">Preparando pedido...</div>

<script>
let pedido = {};

function start(){document.getElementById('step1').classList.add('active')}

function next(n){salvar();document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));document.getElementById('step'+n).classList.add('active');renderResumo()}

function salvar(){document.querySelectorAll('input:checked').forEach(i=>{pedido[i.name || Math.random()] = i.value});localStorage.setItem('pedido', JSON.stringify(pedido));update()}

function update(){document.getElementById('qtd').innerText = Object.keys(pedido).length}

function renderResumo(){let box=document.getElementById('resumo');box.innerHTML='<b>Resumo:</b><br>';Object.values(pedido).forEach(v=>{box.innerHTML+='• '+v+'<br>'})}

function verResumo(){renderResumo();alert('Veja seu resumo abaixo 👇')}

function finalizar(){let nome=document.getElementById('nome').value;let tel=document.getElementById('tel').value;let end=document.getElementById('end').value;if(!nome||!tel||!end) return alert('Preencha tudo');let load=document.getElementById('loading');load.style.display='flex';setTimeout(()=>{let txt='Pedido:%0A';Object.values(pedido).forEach(v=> txt+='- '+v+'%0A');txt+=`%0A👤 ${nome}%0A📞 ${tel}%0A📍 ${end}%0A*Aguardando peso e valor*`;window.location.href='https://wa.me/5575983101631?text='+txt;localStorage.clear()},1500)}
</script>

</body>
</html>
